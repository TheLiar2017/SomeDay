<div class="bg-surface-container-lowest rounded-xl p-8 cloud-shadow">
<div class="space-y-6">
<div>
<label class="block text-sm font-semibold text-on-surface-variant mb-2">项目名称</label>
<input class="w-full bg-surface-container-highest border-none rounded-xl px-4 py-3 text-on-surface focus:ring-2 focus:ring-primary/40 transition-all outline-none" placeholder="例如：2024 夏季营销方案" type="text"/>
</div>
<div>

<textarea class="w-full bg-surface-container-highest border-none rounded-xl px-4 py-3 text-on-surface focus:ring-2 focus:ring-primary/40 transition-all outline-none resize-none" placeholder="在此输入项目的目标、背景及关键交付成果..." rows="4"></textarea>

</div>
</div>

</div>

<span class="text-sm font-bold">公开</span>
<span class="text-[10px] text-on-surface-variant">组织内所有人可见</span>

<label class="relative flex items-center gap-3 p-3 rounded-xl bg-surface-container-low border border-transparent cursor-pointer hover:bg-surface-container-high transition-colors">
<input class="text-primary focus:ring-primary w-4 h-4" name="privacy" type="radio"/>
<div class="flex flex-col">

<span class="text-[10px] text-on-surface-variant">仅受邀成员可见</span>
